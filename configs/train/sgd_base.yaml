dataset: cifar10
model: resnet18

data_root: ./data

data:
  val_size: 5000
  split_seed: 42
  num_workers: 0
  pin_memory: false

training:
  optimizer: sgd
  epochs: 100
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 5e-4
  nesterov: true
  scheduler: none

logging:
  save_every_epochs: 1
  save_final: true
  save_best: true